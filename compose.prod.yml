# Production overrides - deploy as compose.override.yml on production server
# This file configures production-specific settings (CORS, rate limits, build targets)
#
# Usage on production:
#   cp compose.prod.yml compose.override.yml
#   docker compose up -d

services:
  api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # CORS - all production domains
      - Cors__AllowedOrigins__0=https://platform.project-nexus.net
      - Cors__AllowedOrigins__1=https://uk.project-nexus.net
      - Cors__AllowedOrigins__2=https://api.project-nexus.net
      - Cors__AllowedOrigins__3=https://admin.project-nexus.net
      # WebAuthn / FIDO2 - production origins (HTTPS required)
      - Fido2__ServerDomain=project-nexus.net
      - Fido2__ServerName=Project NEXUS
      - Fido2__Origins__0=https://platform.project-nexus.net
      - Fido2__Origins__1=https://uk.project-nexus.net
      - Fido2__Origins__2=https://admin.project-nexus.net
      - Fido2__Origins__3=https://api.project-nexus.net
      # Rate limiting - production values
      - RateLimiting__Auth__PermitLimit=10
      - RateLimiting__Auth__WindowSeconds=60
      - RateLimiting__General__PermitLimit=500
      - RateLimiting__General__WindowSeconds=60
      - FileUpload__UploadsRoot=/app/uploads
      # Sentry — DSN read from production .env (Sentry__Dsn). Empty = disabled.
      - Sentry__Dsn=${Sentry__Dsn:-}
      - Sentry__Environment=${Sentry__Environment:-production}
      - Sentry__TracesSampleRate=${Sentry__TracesSampleRate:-0.1}
    volumes:
      - nexus-backend-uploads:/app/uploads

  # React Frontend - production build (nginx, baked-in env vars)
  react-frontend:
    build:
      context: ./apps/react-frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: https://api.project-nexus.net
        VITE_API_BASE: /api
        VITE_DEFAULT_TENANT_ID: 1
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-production}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}
    ports: !override
      - "127.0.0.1:5173:80"
    volumes: !override []
    environment:
      - NODE_ENV=production

  # Admin Panel - production build (nginx, no hot-reload, no volume mounts)
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: https://api.project-nexus.net
    ports: !override
      - "127.0.0.1:5191:80"
    volumes: !override []
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy

  # UK Frontend - production build (no volume mounts)
  web-uk:
    build:
      context: ./apps/web-uk
      dockerfile: Dockerfile
      target: production
    ports: !override
      - "127.0.0.1:5180:3001"
    volumes: !override []
    env_file: !override []
    environment:
      - NODE_ENV=production
      - PORT=3001
      - API_BASE_URL=http://api:8080
      - COOKIE_SECRET=${COOKIE_SECRET:?COOKIE_SECRET environment variable is required}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET environment variable is required}
      - TENANT_ID=${TENANT_ID:-1}
