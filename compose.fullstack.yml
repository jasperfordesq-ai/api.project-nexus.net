# =============================================================================
# Docker Compose - NEXUS Full Stack LOCAL Development
# =============================================================================
# Runs supported local services for development: Backend + kept frontends
#
# Usage:
#   docker compose -f compose.fullstack.yml up -d --build
#
# Services:
#   - API:              http://localhost:5080  (+ Swagger at /swagger)
#   - React Frontend:   http://localhost:5173  (Vite React SPA)
#   - UK Frontend:      http://localhost:5180  (Express + GOV.UK)
#   - Admin Panel:      http://localhost:5190  (Vite React admin)
#   - RabbitMQ UI:      http://localhost:15672 (guest/guest)
# =============================================================================

name: nexus-fullstack

services:
  # ---------------------------------------------------------------------------
  # API Backend (ASP.NET Core 8)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-fullstack-api
    ports:
      - "5080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=nexus_dev;Username=postgres;Password=postgres
      - Jwt__Secret=${JWT_SECRET:?JWT_SECRET environment variable is required}
      - Jwt__Issuer=
      - Jwt__Audience=
      - Cors__AllowedOrigins__0=http://localhost:5080
      - Cors__AllowedOrigins__1=http://localhost:5173
      - Cors__AllowedOrigins__2=http://localhost:5180
      - Cors__AllowedOrigins__3=http://localhost:5190
      - RateLimiting__Auth__PermitLimit=10
      - RateLimiting__Auth__WindowSeconds=60
      - RateLimiting__General__PermitLimit=200
      - RateLimiting__General__WindowSeconds=60
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - RabbitMq__VirtualHost=/
      - RabbitMq__ExchangeName=nexus.events
      - RabbitMq__Enabled=true
      - FileUpload__UploadsRoot=/app/uploads
    volumes:
      - nexus-fullstack-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexus-fullstack-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ---------------------------------------------------------------------------
  # React Frontend (apps/react-frontend)
  # ---------------------------------------------------------------------------
  react-frontend:
    build:
      context: ./apps/react-frontend
      dockerfile: Dockerfile
      target: dev
    container_name: nexus-fullstack-react
    ports:
      - "5173:5173"
    volumes:
      - ./apps/react-frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DOCKER_ENV=true
      - VITE_API_URL=http://api:8080
      - VITE_API_BASE=/api
      - VITE_DEFAULT_TENANT_ID=1
    depends_on:
      api:
        condition: service_healthy
    networks:
      - nexus-fullstack-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Admin Panel (apps/admin)
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      target: dev
    container_name: nexus-fullstack-admin
    ports:
      - "5190:5190"
    volumes:
      - ./apps/admin:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:5080
    depends_on:
      api:
        condition: service_healthy
    networks:
      - nexus-fullstack-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # UK Frontend (apps/web-uk)
  # ---------------------------------------------------------------------------
  web-uk:
    build:
      context: ./apps/web-uk
      dockerfile: Dockerfile
      target: development
    container_name: nexus-fullstack-uk
    ports:
      - "5180:3001"
    volumes:
      - ./apps/web-uk:/app
      - /app/node_modules
    env_file:
      - ./apps/web-uk/.env.docker
    depends_on:
      api:
        condition: service_healthy
    networks:
      - nexus-fullstack-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Database (PostgreSQL 16)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16.4-bookworm
    container_name: nexus-fullstack-db
    environment:
      POSTGRES_DB: nexus_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - nexus-fullstack-db-data:/var/lib/postgresql/data
    networks:
      - nexus-fullstack-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Message Broker (RabbitMQ)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: nexus-fullstack-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - nexus-fullstack-rabbitmq-data:/var/lib/rabbitmq
    networks:
      - nexus-fullstack-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  nexus-fullstack-net:
    name: nexus-fullstack-net
    driver: bridge

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  nexus-fullstack-db-data:
    name: nexus-fullstack-db-data
  nexus-fullstack-rabbitmq-data:
    name: nexus-fullstack-rabbitmq-data
  nexus-fullstack-uploads:
    name: nexus-fullstack-uploads
