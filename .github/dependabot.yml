#
# Policy: Dependabot is restricted to security-only updates.
# Routine version-bump PRs are disabled via `open-pull-requests-limit: 0`.
# GitHub continues to file PRs for security advisories regardless of this
# setting — see
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file#open-pull-requests-limit
#
# Rationale: blind dependency bumps without CI cause production incidents.
# Until a CI pipeline runs the full test suite on each bump, only real
# security advisories (with a CVE / GHSA id) should generate PRs.

version: 2
updates:
  # NuGet packages (.NET)
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "security"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "security"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "security"

  # npm — V1 parity React SPA
  - package-ecosystem: "npm"
    directory: "/apps/react-frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "security"

  # npm — standalone admin (Refine app)
  - package-ecosystem: "npm"
    directory: "/apps/admin"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "security"

  # npm — UK GOV.UK Express frontend
  - package-ecosystem: "npm"
    directory: "/apps/web-uk"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "security"
