name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Nexus.sln

      - name: Build
        run: dotnet build Nexus.sln --no-restore --configuration Release

  test:
    name: Test (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore tests/Nexus.Api.Tests/Nexus.Api.Tests.csproj

      - name: Build tests
        run: dotnet build tests/Nexus.Api.Tests/Nexus.Api.Tests.csproj --no-restore --configuration Release

      # Keep the required push gate focused on executable contract evidence.
      # XPlat coverage made the serial suite exceed 75 minutes before VSTest
      # could flush any TRX; isolated shards preserve every test and artifact.
      - name: Run tests
        shell: pwsh
        run: >-
          ./scripts/test-backend-shard.ps1
          -ShardCount 4
          -ShardIndex ${{ matrix.shard }}
          -HangTimeoutSeconds 600
          -ManifestPath "artifacts/backend-test-shards/manifest-shard-${{ matrix.shard }}.json"
        env:
          JWT_SECRET: "ci-test-secret-key-that-is-long-enough-for-hs256"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: artifacts/backend-test-shards
          if-no-files-found: error
          retention-days: 30

  frontend:
    name: Frontend (react-frontend)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/react-frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/react-frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit -p .

      - name: Build
        run: npm run build

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build, test, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
