name: Production Health Check

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    name: Check Production Health
    runs-on: ubuntu-latest

    steps:
      - name: Check API health
        id: api_health
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            https://api.project-nexus.net/health || echo "000")
          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::API health check failed with HTTP $HTTP_STATUS"
          fi

      - name: Check UK frontend
        id: uk_health
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            https://uk.project-nexus.net || echo "000")
          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::UK frontend returned HTTP $HTTP_STATUS"
          fi

      - name: Check React frontend
        id: app_health
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            https://platform.project-nexus.net || echo "000")
          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::React frontend returned HTTP $HTTP_STATUS"
          fi

      - name: Create issue on failure
        if: >-
          always() &&
          (steps.api_health.outputs.status != '200' ||
          steps.uk_health.outputs.status != '200' ||
          steps.app_health.outputs.status != '200')
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Production health check failed';
            const body = [
              '## Production Health Alert',
              '',
              `**Time**: ${new Date().toISOString()}`,
              `**API Status**: HTTP ${process.env.API_STATUS}`,
              `**UK Frontend**: HTTP ${process.env.UK_STATUS}`,
              `**React Frontend**: HTTP ${process.env.APP_STATUS}`,
              '',
              '### Read-only triage',
              '1. Record the UTC/Irish time, failing component, status, and correlation ID.',
              '2. Confirm the public health symptom without authenticated or state-changing requests.',
              '3. Consult `docs/system/INCIDENT_RESPONSE.md` and obtain explicit authorization before production access.',
              '4. Do not restart the API casually: startup can apply EF migrations.',
              '5. After authorization, verify the live component map in `.claude/production-containers.md` before inspecting it.',
              '',
              '_This issue was auto-generated by the health check workflow._'
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find(issue => issue.title === title);
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Health check still failing at ${new Date().toISOString()} — API: HTTP ${process.env.API_STATUS}; UK: HTTP ${process.env.UK_STATUS}; React: HTTP ${process.env.APP_STATUS}`
              });
            }
        env:
          API_STATUS: ${{ steps.api_health.outputs.status }}
          UK_STATUS: ${{ steps.uk_health.outputs.status }}
          APP_STATUS: ${{ steps.app_health.outputs.status }}
