# /etc/nginx/conf.d/admin.project-nexus.conf
# Reverse proxy: admin.project-nexus.net → Docker container on 127.0.0.1:5191
#
# On production server:
#   sudo cp /opt/nexus-backend/nginx-configs/admin.project-nexus.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL is handled by Plesk (Let's Encrypt). This file handles HTTP->Docker proxying.

server {
    listen 80;
    server_name admin.project-nexus.net;

    # Redirect HTTP to HTTPS (Plesk manages SSL termination)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name admin.project-nexus.net;

    # SSL certificates managed by Plesk/Let's Encrypt
    # ssl_certificate and ssl_certificate_key are injected by Plesk

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:5191;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
